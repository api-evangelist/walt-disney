naftiko: 1.0.0-alpha2
info:
  label: Disney Content Discovery
  description: Workflow for discovering Disney characters and content metadata across films, TV shows, video games, and park
    attractions. Enables content applications, fans, and media platforms to explore Disney's character universe and build
    engaging experiences.
  tags:
  - Disney
  - Entertainment
  - Characters
  - Content Discovery
  - Media
  created: '2026-05-03'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: disney-characters
    baseUri: https://api.disneyapi.dev
    description: Disney Characters REST API (no authentication required)
    resources:
    - name: characters
      path: /character
      description: All Disney characters
      operations:
      - name: list-characters
        method: GET
        description: List all Disney characters with pagination
        inputParameters:
        - name: page
          in: query
          type: integer
          required: false
          description: Page number (default 1)
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Characters per page (default 50, max 200)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: character-by-id
      path: /character/{id}
      description: Single Disney character
      operations:
      - name: get-character
        method: GET
        description: Get a specific Disney character by ID
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Character unique identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: disney-content-api
    description: Unified REST API for Disney character and content discovery.
    resources:
    - path: /v1/characters
      name: characters
      description: Disney character catalog
      operations:
      - method: GET
        name: list-characters
        description: List all Disney characters with pagination
        call: disney-characters.list-characters
        with:
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/characters/{id}
      name: character
      description: Individual character details
      operations:
      - method: GET
        name: get-character
        description: Get a specific Disney character by ID
        call: disney-characters.get-character
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: disney-content-mcp
    transport: http
    description: MCP server for AI-assisted Disney character and content exploration.
    tools:
    - name: list-disney-characters
      description: List Disney characters from the complete Disney universe database
      hints:
        readOnly: true
        openWorld: true
      call: disney-characters.list-characters
      with:
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-disney-character
      description: Get full details for a specific Disney character including all films, TV shows, and park attractions
      hints:
        readOnly: true
        openWorld: false
      call: disney-characters.get-character
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
