naftiko: "1.0.0-alpha1"

info:
  label: "Disney Characters API"
  description: >-
    The Disney Characters API provides access to a comprehensive database of
    9,820+ Disney characters across all Disney brands, including associated
    films, TV shows, video games, and park attractions. No authentication required.
  tags:
    - Disney
    - Characters
    - Entertainment
    - Content
    - Media
  created: "2026-05-03"
  modified: "2026-05-03"

capability:
  consumes:
    - type: http
      namespace: disney-characters
      baseUri: https://api.disneyapi.dev
      description: "Disney Characters REST API (no authentication required)"
      resources:
        - name: characters
          path: /character
          description: All Disney characters
          operations:
            - name: list-characters
              method: GET
              description: List all Disney characters with pagination
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number (default 1)
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: Characters per page (default 50, max 200)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: character-by-id
          path: /character/{id}
          description: Single Disney character
          operations:
            - name: get-character
              method: GET
              description: Get a specific Disney character by ID
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: Character unique identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: disney-characters-api
      resources:
        - path: /v1/characters
          name: characters
          operations:
            - method: GET
              name: list-characters
              description: List Disney characters
              call: "disney-characters.list-characters"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/characters/{id}
          name: character
          operations:
            - method: GET
              name: get-character
              description: Get Disney character by ID
              call: "disney-characters.get-character"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: disney-characters-mcp
      transport: http
      tools:
        - name: list-characters
          description: List Disney characters with optional pagination
          hints:
            readOnly: true
            openWorld: true
          call: "disney-characters.list-characters"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-character
          description: Get details of a specific Disney character by ID
          hints:
            readOnly: true
            openWorld: false
          call: "disney-characters.get-character"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
