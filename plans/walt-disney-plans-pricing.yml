description: The Walt Disney Company does not publish a corporate developer
  portal or paid API plan. Public touchpoints (Disney+, ESPN, Hulu, Disney
  Parks) expose consumer-facing services that do not document third-party
  API pricing. Strategic data and content integrations flow through bilateral
  partnership agreements (broadcasters, distributors, studio licensing).
  Trimmed scaffold to a single Contact Sales plan because no public API price
  list exists.
sources:
  - https://thewaltdisneycompany.com/
notes: No public API marketplace or self-service developer plan. Integrations
  are partnership / licensing-driven and negotiated bilaterally.
plans:
  - id: walt-disney-contact-sales
    name: Contact Sales
    type: enterprise
    description: API and data integrations with Walt Disney are negotiated
      under bilateral partnership and licensing agreements (content
      distribution, broadcast, parks operations).
    entries:
      - label: Partnership Agreement
        name: partnership_agreement
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Bilateral Partnership Terms
      - name: Content Licensing
      - name: Distribution Agreements
