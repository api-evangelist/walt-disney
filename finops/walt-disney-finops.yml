description: FinOps view of The Walt Disney Company at the corporate level.
  Disney does not bill API consumption directly; integration costs and
  revenues flow through bilateral content-licensing, distribution, and
  partnership settlements rather than a metered API invoice surface.
sources:
  - https://thewaltdisneycompany.com/
notes: No corporate-level API invoice; FOCUS attribution flows through the
  partnership-settlement entity.
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Walt Disney Partnerships
  ServiceCategory: Entertainment / Media
  ProviderName: The Walt Disney Company
  PublisherName: The Walt Disney Company
  InvoiceIssuerName: The Walt Disney Company
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: partnership_settlement
    description: Negotiated settlement under the bilateral partnership /
      licensing agreement.
    unit: varies
    aggregation: sum
    dimensions:
      - business_segment
      - partner
principles:
  - name: Visibility
    description: Track partnership-level settlements at the corporate
      treasury layer; per-API consumption telemetry is partner-side.
  - name: Allocation
    description: Allocate partnership cost / revenue to the relevant
      Disney business segment (Studios, Streaming, Parks, ESPN).
  - name: Optimization
    description: Optimization happens at the partnership-renegotiation
      layer; there is no in-flight metered usage to tune.
  - name: Accountability
    description: Corporate development / business-segment leadership
      owns the partnership terms; legal and finance own settlement.
