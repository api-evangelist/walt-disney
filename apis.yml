description: >-
  The Walt Disney Company is a leading diversified international family entertainment and media enterprise with
  operations across media networks, parks and resorts, studio entertainment, and direct-to-consumer streaming. Disney's
  developer APIs and open source projects enable partners and developers to integrate Disney content, characters, and
  experiences into their applications.
