  description: >-
    The Disney Characters API provides REST and GraphQL interfaces to a comprehensive database of 9,820+ Disney
    characters across all Disney brands including Walt Disney Animation, Pixar, Marvel, Star Wars, and National
    Geographic. Each character includes associated films, short films, TV shows, video games, park attractions, and
    character relationships. The API requires no authentication and is freely accessible.
