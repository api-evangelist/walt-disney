openapi: 3.1.0
info:
  title: Disney Developer API
  description: >-
    Disney provides developer APIs for accessing entertainment content metadata, park information, and media services. The APIs enable partners to integrate Disney content and experiences into their applications.
  version: '1.0'
  contact:
    name: Walt Disney Developer Support
    url: https://developer.disney.com/
externalDocs:
  description: Documentation
  url: https://developer.disney.com/
servers:
  - url: https://api.disney.com
    description: Production
tags:
  - name: Entertainment
    description: Entertainment operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Entertainment
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
