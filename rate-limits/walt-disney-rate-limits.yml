description: The Walt Disney Company does not operate a public developer
  portal and does not publish API rate-limit policy. Any request-rate
  governance applies inside bilateral partner integrations and is not
  publicly documented.
sources:
  - https://thewaltdisneycompany.com/
notes: No public rate-limit policy. Limits, when applicable, are part of the
  bilateral partner integration agreement.
limits:
  - name: Disney Partner Integrations
    scope: contract
    metric: varies
    limit: see partnership agreement
    notes: Per-partner thresholds are negotiated bilaterally; not publicly
      documented.
policies:
  - name: Bilateral Governance
    description: Throttling and capacity expectations are documented inside
      the partnership / licensing agreement rather than via a public
      developer-portal contract.
